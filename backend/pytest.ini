[pytest]
# Test modules do bare `import <module>` for files that live directly in
# backend/ (e.g. `import cloud_smoke`, `import run_worker`, `import db as db_mod`).
# Without backend/ on sys.path, collecting backend/tests from outside this
# directory (e.g. `pytest backend/tests` from the repo root) fails with
# ModuleNotFoundError. `pythonpath = .` adds this file's directory (backend/)
# to sys.path regardless of the invoking cwd, so the suite is runnable both
# as `cd backend && pytest tests -q` and as `pytest backend/tests -q` from
# the repo root.
pythonpath = .
testpaths = tests
